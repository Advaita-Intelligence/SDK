name: acai_flutter
description: Official Acai Flutter SDK, supporting Android, iOS, macOS, and web platforms.
version: 4.3.11
homepage: https://acai.io
repository: https://github.com/YOUR_ORG/acai-flutter


environment:
  sdk: ">=3.3.0 < 4.0.0"
  flutter: ">=3.7.0"
dependencies:
  flutter:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter

dev_dependencies:
  build_runner: ^2.3.3
  flutter_lints: ^2.0.3
  flutter_test:
    sdk: flutter
  lints: ^2.1.1
  mockito: ^5.4.0
  test: ^1.22.0

flutter:
  plugin:
    platforms:
      android:
        package: com.acai.acai_flutter
        pluginClass: AcaiFlutterPlugin
      ios:
        pluginClass: AcaiFlutterPlugin
        sharedDarwinSource: true
      macos:
        pluginClass: AcaiFlutterPlugin
        sharedDarwinSource: true
      web:
        pluginClass: AcaiFlutterPlugin
        fileName: acai_web.dart
